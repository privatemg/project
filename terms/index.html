/* ============================================================
   LANG SWITCHER
   ============================================================ */
var FLAGS  = {fr:'<svg xmlns="http://www.w3.org/2000/svg" width="22" height="15" viewBox="0 0 900 600" style="border-radius:2px;vertical-align:middle"><rect width="300" height="600" fill="#002395"/><rect x="300" width="300" height="600" fill="#fff"/><rect x="600" width="300" height="600" fill="#ED2939"/></svg>', en:'<svg xmlns="http://www.w3.org/2000/svg" width="22" height="15" viewBox="0 0 60 30" style="border-radius:2px;vertical-align:middle"><clipPath id="ca"><path d="M0 0v30h60V0z"/></clipPath><clipPath id="cb"><path d="M30 15h30v15zv15H0zH0V0zV0h30z"/></clipPath><g clip-path="url(#ca)"><path d="M0 0v30h60V0z" fill="#012169"/><path d="M0 0l60 30m0-30L0 30" stroke="#fff" stroke-width="6"/><path d="M0 0l60 30m0-30L0 30" clip-path="url(#cb)" stroke="#C8102E" stroke-width="4"/><path d="M30 0v30M0 15h60" stroke="#fff" stroke-width="10"/><path d="M30 0v30M0 15h60" stroke="#C8102E" stroke-width="6"/></g></svg>', zh:'<svg xmlns="http://www.w3.org/2000/svg" width="22" height="15" viewBox="0 0 30 20" style="border-radius:2px;vertical-align:middle"><rect width="30" height="20" fill="#DE2910"/><polygon points="5,2 6.18,5.09 9.51,5.09 6.9,7.09 7.84,10.18 5,8.37 2.16,10.18 3.1,7.09 0.49,5.09 3.82,5.09" fill="#FFDE00"/></svg>'};
var LABELS = {fr:'FR',   en:'EN',   zh:'ZH'};
var curLang = localStorage.getItem('anklang') || 'fr';

function applyLang(lang) {
  if (!I18N[lang]) return;
  var t = I18N[lang];
  document.documentElement.lang = lang === 'fr' ? 'fr' : lang === 'en' ? 'en' : 'zh';

  // Static UI strings
  document.getElementById('langFlag').innerHTML      = FLAGS[lang];
  document.getElementById('langLabel').textContent   = LABELS[lang];
  document.getElementById('heroTag').textContent     = t.heroTag;
  document.getElementById('heroH1').innerHTML        = t.heroH1 + '<br><span class="gd">' + t.heroGd + '</span>';
  document.getElementById('heroDesc').textContent    = t.heroDesc;
  document.getElementById('q').placeholder           = t.searchPh;
  document.getElementById('chipAll').textContent     = t.chipAll;
  document.getElementById('chipTerms').textContent   = t.chipTerms;
  document.getElementById('chipFaq').textContent     = t.chipFaq;
  document.getElementById('chipContact').textContent = t.chipContact;
  document.getElementById('sideTitle').textContent   = t.sideTitle;
  document.getElementById('sideTerms').textContent   = t.sideTerms;
  document.getElementById('sideFaq').textContent     = t.sideFaq;
  document.getElementById('sideContact').textContent = t.sideContact;
  document.getElementById('footCopy').textContent    = t.footCopy;
  document.getElementById('backBtn').innerHTML       = t.back + ' <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';
  document.getElementById('no').textContent          = t.noResult;

  // Active state on lang buttons
  document.querySelectorAll('.lang-opt').forEach(function(o) {
    o.classList.toggle('active', o.dataset.lang === lang);
  });

  localStorage.setItem('anklang', lang);
  curLang = lang;

  // Rebuild cards with new language content
  draw();
}

// Dropdown toggle
document.getElementById('langBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  var d = document.getElementById('langDrop');
  var b = document.getElementById('langBtn');
  d.classList.toggle('open');
  b.classList.toggle('open');
});
document.querySelectorAll('.lang-opt').forEach(function(o) {
  o.addEventListener('click', function() {
    applyLang(o.dataset.lang);
    document.getElementById('langDrop').classList.remove('open');
    document.getElementById('langBtn').classList.remove('open');
  });
});
document.addEventListener('click', function() {
  document.getElementById('langDrop').classList.remove('open');
  document.getElementById('langBtn').classList.remove('open');
});

/* ============================================================
   ACCORDION / SEARCH / FILTER
   ============================================================ */
var chips = [...document.querySelectorAll('.chip')];
var fl = 'all';
var plus = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>';

function acc(g, item, i) {
  return '<div class="acc item ' + (i===0?'open':'') + '" data-g="' + g + '" data-t="' + (item[0]+' '+item[1]).toLowerCase() + '">'
    + '<button class="q"><span class="qt">' + (g==='terms'?'<span class="num">'+(i+1)+'</span>':'') + item[0] + '</span>' + plus + '</button>'
    + '<div class="a"' + (i===0?' style="max-height:200px"':'') + '><p>' + item[1] + '</p></div></div>';
}

function draw() {
  var t = I18N[curLang];
  var A = document.getElementById('app');
  var noEl = document.getElementById('no');
  A.innerHTML = noEl.outerHTML
    + '<article class="card block" id="terms" data-g="terms"><h2><span>' + t.cardTermsH2a + '</span> ' + t.cardTermsH2b + '</h2>'
    + t.terms.map(function(x,i){ return acc('terms',x,i); }).join('')
    + '</article>'
    + '<article class="card block" id="faq" data-g="faq"><h2><span>' + t.cardFaqH2 + '</span></h2>'
    + t.faq.map(function(x,i){ return acc('faq',x,i); }).join('')
    + '</article>'
    + '<article class="card block" id="contact-info" data-g="contact"><h2><span>' + t.cardContactH2 + '</span></h2>'
    + '<div class="contact">'
    + t.contact.map(function(x){
        return '<a class="cc item" data-g="contact" data-t="' + (x[0]+' '+x[1]).toLowerCase() + '" href="' + x[2] + '"' + (x[2].startsWith('http')?' target="_blank" rel="noopener"':'') + '>'
          + '<b>' + x[0] + '</b><span>' + x[1] + '</span></a>';
      }).join('')
    + '</div></article>';

  bind();
  run();
}

function bind() {
  document.querySelectorAll('.q').forEach(function(b) {
    b.onclick = function() {
      var p = b.parentElement, a = p.querySelector('.a'), o = p.classList.contains('open');
      p.classList.toggle('open', !o);
      a.style.maxHeight = o ? null : a.scrollHeight + 'px';
    };
  });
}

function run() {
  var s = document.getElementById('q').value.toLowerCase().trim();
  var n = 0;
  document.querySelectorAll('.item').forEach(function(i) {
    var ok = (fl==='all' || i.dataset.g===fl) && (!s || i.dataset.t.includes(s));
    i.classList.toggle('hide', !ok);
    if (ok) {
      n++;
      if (s && i.classList.contains('acc')) {
        i.classList.add('open');
        i.querySelector('.a').style.maxHeight = i.querySelector('.a').scrollHeight + 'px';
      }
    }
  });
  document.querySelectorAll('.block').forEach(function(b) {
    var ok = (fl==='all' || b.dataset.g===fl) && [...b.querySelectorAll('.item')].some(function(x){ return !x.classList.contains('hide'); });
    b.classList.toggle('hide', !ok);
  });
  var noEl = document.querySelector('.no');
  if (noEl) noEl.classList.toggle('show', !n);
}

chips.forEach(function(c) {
  c.onclick = function() {
    chips.forEach(function(x){ x.classList.remove('on'); });
    c.classList.add('on');
    fl = c.dataset.f;
    run();
  };
});
document.getElementById('q').oninput = run;

// Init
applyLang(curLang);
</script>
